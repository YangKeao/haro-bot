# Example configuration for haro-bot

server_addr = ":8080"
tidb_dsn = "root:@tcp(127.0.0.1:4000)/haro_bot?parseTime=true"

llm_base_url = "https://api.openai.com/v1"
llm_api_key = "sk-..."
llm_model = "gpt-4o-mini"
llm_prompt_format = "openai"
llm_reasoning_enabled = false
llm_reasoning_effort = ""
llm_http_debug = false
llm_context_window = 0
llm_auto_compact_token_limit = 0
llm_effective_context_window_percent = 95

telegram_token = ""

skills_dir = "./skills"
skills_repo_allowlist = []
skills_sync_interval = "10m"

brave_search_api_key = ""

fs_allowed_roots = ["./skills"]
fs_allowed_exec_dirs = []

tool_max_turns = 1024

[log]
level = "info"
development = false
encoding = "json"
